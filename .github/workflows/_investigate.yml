name: Investigate Live Logs

on:
  push:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Stream A
        run: |
          for i in $(seq 1 300); do
            echo "STREAM-A $i at $(date -u +%H:%M:%S)"
            sleep 2
          done
      - name: Stream B
        run: |
          for i in $(seq 1 600); do
            echo "STREAM-B $i at $(date -u +%H:%M:%S)"
            sleep 2
          done
